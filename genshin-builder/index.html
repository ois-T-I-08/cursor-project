<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>原神 キャラ育成管理</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">✦</span>
          <h1>原神 キャラ育成管理</h1>
        </div>
        <nav class="nav">
          <button class="nav-btn active" data-view="dashboard">ダッシュボード</button>
          <button class="nav-btn" data-view="roster">キャラ一覧</button>
          <button class="nav-btn" data-view="materials">素材計算</button>
        </nav>
      </div>
    </header>

    <main class="main">
      <!-- ダッシュボード -->
      <section id="view-dashboard" class="view active">
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-label">登録キャラ</span>
            <span class="stat-value" id="stat-total">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Lv.90 達成</span>
            <span class="stat-value" id="stat-max-level">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">育成中</span>
            <span class="stat-value" id="stat-in-progress">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">優先キャラ</span>
            <span class="stat-value" id="stat-priority">0</span>
          </div>
        </div>

        <div class="section-header">
          <h2>優先育成キャラ</h2>
        </div>
        <div id="priority-list" class="priority-list"></div>

        <div class="section-header">
          <h2>最近更新</h2>
        </div>
        <div id="recent-list" class="character-grid"></div>
      </section>

      <!-- キャラ一覧 -->
      <section id="view-roster" class="view">
        <div class="toolbar">
          <div class="filters">
            <select id="filter-element">
              <option value="">全元素</option>
              <option value="pyro">炎</option>
              <option value="hydro">水</option>
              <option value="electro">雷</option>
              <option value="cryo">氷</option>
              <option value="anemo">風</option>
              <option value="geo">岩</option>
              <option value="dendro">草</option>
            </select>
            <select id="filter-weapon">
              <option value="">全武器</option>
              <option value="sword">片手剣</option>
              <option value="claymore">両手剣</option>
              <option value="polearm">長柄武器</option>
              <option value="bow">弓</option>
              <option value="catalyst">法器</option>
            </select>
            <select id="filter-rarity">
              <option value="">全レア</option>
              <option value="5">★5</option>
              <option value="4">★4</option>
            </select>
            <input type="search" id="filter-search" placeholder="キャラ名で検索..." />
          </div>
          <button class="btn btn-primary" id="btn-add-character">+ キャラ追加</button>
        </div>
        <div id="roster-grid" class="character-grid"></div>
      </section>

      <!-- 素材計算 -->
      <section id="view-materials" class="view">
        <div class="materials-layout">
          <div class="materials-form card">
            <h2>育成素材計算</h2>
            <div class="form-group">
              <label>キャラクター</label>
              <select id="calc-character"></select>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>現在レベル</label>
                <input type="number" id="calc-current-level" min="1" max="90" value="1" />
              </div>
              <div class="form-group">
                <label>目標レベル</label>
                <input type="number" id="calc-target-level" min="1" max="90" value="90" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>天賦：通常攻撃</label>
                <div class="talent-inputs">
                  <input type="number" id="calc-na-current" min="1" max="10" value="1" />
                  <span>→</span>
                  <input type="number" id="calc-na-target" min="1" max="10" value="10" />
                </div>
              </div>
              <div class="form-group">
                <label>天賦：元素スキル</label>
                <div class="talent-inputs">
                  <input type="number" id="calc-skill-current" min="1" max="10" value="1" />
                  <span>→</span>
                  <input type="number" id="calc-skill-target" min="1" max="10" value="10" />
                </div>
              </div>
              <div class="form-group">
                <label>天賦：元素爆発</label>
                <div class="talent-inputs">
                  <input type="number" id="calc-burst-current" min="1" max="10" value="1" />
                  <span>→</span>
                  <input type="number" id="calc-burst-target" min="1" max="10" value="10" />
                </div>
              </div>
            </div>
            <button class="btn btn-primary" id="btn-calculate">計算する</button>
          </div>
          <div class="materials-result card">
            <h2>必要素材</h2>
            <div id="calc-results">
              <p class="empty-state">キャラと目標を選んで「計算する」を押してください</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- キャラ追加モーダル -->
  <dialog id="modal-add" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>キャラクター追加</h2>
        <button class="modal-close" data-close>&times;</button>
      </div>
      <input type="search" id="add-search" class="modal-search" placeholder="キャラ名で検索..." />
      <div id="add-character-list" class="add-character-list"></div>
    </div>
  </dialog>

  <!-- キャラ詳細モーダル -->
  <dialog id="modal-detail" class="modal modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="detail-name">キャラ名</h2>
        <button class="modal-close" data-close>&times;</button>
      </div>
      <div id="detail-body" class="detail-body"></div>
    </div>
  </dialog>

  <script type="module" src="js/app.js"></script>
</body>
</html>
