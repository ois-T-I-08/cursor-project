name: genshin_builder_mobile
description: 原神キャラ育成管理アプリ（非公式ファンツール）
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  http: ^1.3.0
  # Drift（sqflite は削除済み — DB パスは database_path.dart）
  drift: ^2.22.1
  # sqlite3_flutter_libs と同時依存不可（同一 Android namespace）。SQLCipher 単体で平文も開ける。
  # drift_flutter は sqlite3_flutter_libs を引き込むため未使用で外す（NativeDatabase 直結）。
  sqlcipher_flutter_libs: 0.6.4
  sqlite3: 2.9.4
  path: ^1.9.1
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  intl: ^0.20.2
  uuid: ^4.5.1
  # Phase 2 — HoYoLAB
  flutter_secure_storage: ^9.2.4
  webview_flutter: ^4.10.0
  crypto: ^3.0.6
  flutter_local_notifications: 19.5.0
  timezone: 0.10.1
  workmanager: 0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  assets:
    - assets/config/artifact_score_weights.json
    - assets/config/artifact_score_type_overrides.json
    - assets/config/daily_material_schedule.json
    - assets/config/resin_farm_costs.json
    - assets/config/ley_line_overflow_events.json
    - assets/config/level_exp_table.json
    - assets/config/artifact_set_recommendations.json
    - assets/config/gacha_banner_history.json
