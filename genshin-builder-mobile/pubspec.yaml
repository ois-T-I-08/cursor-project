name: genshin_builder_mobile
description: 原神キャラ育成管理アプリ（非公式ファンツール）
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  http: ^1.3.0
  # Drift（sqflite は削除済み — DB パスは database_path.dart）
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28
  path: ^1.9.1
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  uuid: ^4.5.1
  # Phase 2 — HoYoLAB
  flutter_secure_storage: ^9.2.4
  webview_flutter: ^4.10.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
