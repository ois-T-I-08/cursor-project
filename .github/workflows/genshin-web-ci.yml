name: Genshin Web CI

on:
  push:
    paths:
      - "genshin-builder-app/**"
      - "shared/domain-golden/**"
      - ".github/workflows/genshin-web-ci.yml"
  pull_request:
    paths:
      - "genshin-builder-app/**"
      - "shared/domain-golden/**"
      - ".github/workflows/genshin-web-ci.yml"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: genshin-builder-app
    env:
      DATABASE_URL: "file:./dev.db"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: genshin-builder-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
