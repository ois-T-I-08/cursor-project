name: Flutter Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: genshin-builder-mobile

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.5"
          cache: true

      - name: Flutter version
        run: flutter --version

      - run: flutter pub get

      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter analyze

      - run: flutter test test/domain/phase3_upgrade_test.dart --reporter expanded

      - run: flutter test --reporter expanded
