name: Genshin Mobile CI

on:
  push:
    paths:
      - "genshin-builder-mobile/**"
      - "shared/domain-golden/**"
      - ".github/workflows/genshin-mobile-ci.yml"
  pull_request:
    paths:
      - "genshin-builder-mobile/**"
      - "shared/domain-golden/**"
      - ".github/workflows/genshin-mobile-ci.yml"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: genshin-builder-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.5"
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Parity gate (protected domain tests)
        run: |
          flutter test test/domain/domain_golden_test.dart
          flutter test test/domain/artifact_completion_test.dart
          flutter test test/domain/artifact_score_test.dart

      - name: Phase 3 tests
        run: |
          flutter test test/domain/phase3_upgrade_test.dart --reporter expanded
          flutter test test/domain/phase3_route_team_test.dart --reporter expanded

      - name: Test
        run: flutter test --reporter expanded

      - name: Guard against committed secrets
        working-directory: .
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import subprocess
          import sys

          private_key_pattern = re.compile(
              r"BEGIN (?:RSA |OPENSSH )?PRIVATE KEY"
          )
          cookie_pattern = re.compile(
              r"ltoken_v2=([^;\"'\s]*)"
          )

          allowed_prefixes = (
              "dummy",
              "test",
              "example",
              "$",
          )
          allowed_exact_values = {
              "a=b=c",
          }

          tracked_files = subprocess.check_output(
              ["git", "ls-files", "genshin-builder-mobile"],
              text=True,
          ).splitlines()

          hits = []

          for file_name in tracked_files:
              path = Path(file_name)

              if not path.is_file():
                  continue

              try:
                  text = path.read_text(encoding="utf-8")
              except (UnicodeDecodeError, OSError):
                  continue

              for line_number, line in enumerate(text.splitlines(), start=1):
                  if private_key_pattern.search(line):
                      hits.append(
                          f"{file_name}:{line_number}: private key marker"
                      )

                  for match in cookie_pattern.finditer(line):
                      value = match.group(1).strip()

                      # `contains("ltoken_v2=")` etc ? key name only, no value
                      if not value:
                          continue

                      # Test dummy values
                      if value in allowed_exact_values:
                          continue

                      if value.startswith(allowed_prefixes):
                          continue

                      hits.append(
                          f"{file_name}:{line_number}: possible literal ltoken_v2 value"
                      )

          if hits:
              print("Potential secret material found in committed source:")
              for hit in hits:
                  print(hit)
              sys.exit(1)

          print("No probable committed secrets found")
          PY
