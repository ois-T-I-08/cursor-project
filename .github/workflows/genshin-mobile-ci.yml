name: Genshin Mobile CI

on:
  push:
    paths:
      - "genshin-builder-mobile/**"
      - "shared/domain-golden/**"
      - ".github/workflows/genshin-mobile-ci.yml"
  pull_request:
    paths:
      - "genshin-builder-mobile/**"
      - "shared/domain-golden/**"
      - ".github/workflows/genshin-mobile-ci.yml"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: genshin-builder-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Parity gate (protected domain tests)
        run: |
          flutter test test/domain/domain_golden_test.dart
          flutter test test/domain/artifact_completion_test.dart
          flutter test test/domain/artifact_score_test.dart

      - name: Test
        run: flutter test

      - name: Guard against committed secrets
        working-directory: .
        run: |
          set -euo pipefail
          hits="$(grep -RInE 'ltoken_v2=|BEGIN RSA PRIVATE KEY|BEGIN OPENSSH PRIVATE KEY' \
            --exclude-dir=build --exclude-dir=.dart_tool --exclude-dir=.git \
            genshin-builder-mobile || true)"
          if [ -n "$hits" ]; then
            echo "Potential secret material found in source:"
            echo "$hits"
            exit 1
          fi
          echo "No obvious secret patterns found"
